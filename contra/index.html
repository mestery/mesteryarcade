<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTRA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>CONTRA</h1>
        <div class="game-info">
            <div class="score">SCORE: <span id="score">0</span></div>
            <div class="lives">LIVES: <span id="lives">3</span></div>
            <div class="level">LEVEL: <span id="level">1</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <!-- Touch Controls for Mobile -->
        <div class="touch-controls" id="touchControls">
            <div class="dpad-container">
                <div class="dpad" id="dpad">
                    <div class="dpad-up" data-key="ArrowUp"></div>
                    <div class="dpad-down" data-key="ArrowDown"></div>
                    <div class="dpad-left" data-key="ArrowLeft"></div>
                    <div class="dpad-right" data-key="ArrowRight"></div>
                </div>
            </div>
            <div class="action-buttons">
                <div class="action-btn jump-btn" id="jumpBtn" data-key="z">JUMP</div>
                <div class="action-btn shoot-btn" id="shootBtn" data-key="x">SHOOT</div>
            </div>
        </div>
        
        <div class="start-screen" id="startScreen">
            <h2>CONTRA</h2>
            <p class="subtitle">JOIN THE LEGENDARY SURVIVAL SHOOTER</p>
            <button id="startBtn">INSERT COIN / START GAME</button>
        </div>
        <div class="game-over" id="gameOver">
            <h2>GAME OVER</h2>
            <p>FINAL SCORE: <span id="finalScore">0</span></p>
            <button id="restartBtn">TRY AGAIN</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
