<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- CRT corner decorations -->
        <div class="crt-corner tl"></div>
        <div class="crt-corner tr"></div>
        <div class="crt-corner bl"></div>
        <div class="crt-corner br"></div>

        <!-- CRT scanline effect -->
        <div class="scanlines"></div>
        <div class="crt-flicker"></div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="game-info">
            <div class="score-board">
                <div id="high-score">HIGH SCORE: 0</div>
                <div id="score">SCORE: 0</div>
            </div>
            <div id="lives">LIVES: 3</div>
        </div>

        <div id="game-over" class="hidden">
            <h2>GAME OVER</h2>
            <p>Your final score: <span id="final-score">0</span></p>
            <button id="restart-button">Play Again</button>
        </div>

        <div id="start-screen">
            <h2 class="title-logo">SPACE INVADERS</h2>
            <p class="subtitle">DEFEND EARTH FROM THE ALIENS!</p>
            <div class="score-board">
                <div id="high-score-start">HIGH SCORE: 0</div>
            </div>
            <p class="desktop-hint">Use <strong>&larr; &rarr;</strong> to move</p>
            <p class="desktop-hint">Use <strong>SPACE</strong> to shoot</p>
            <div class="mobile-hint">Tap buttons to play</div>
            <button id="start-button">Start Game</button>
        </div>

        <!-- Mobile touch controls -->
        <div id="mobile-controls">
            <div class="control-row">
                <button id="move-left" class="mobile-btn" aria-label="Move Left">←</button>
                <button id="shoot" class="mobile-btn shoot-btn" aria-label="Shoot">●</button>
                <button id="move-right" class="mobile-btn" aria-label="Move Right">→</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
