<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestery Arcade</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
            margin-bottom: 30px;
        }

        .games-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-card {
            background-color: #111;
            border: 2px solid #0f0;
            padding: 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .game-card h2 {
            margin-top: 0;
            color: #0f0;
        }

        .game-card a {
            display: block;
            color: #0f0;
            text-decoration: none;
            font-size: 18px;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #0f0;
            transition: all 0.3s;
        }

        .game-card a:hover {
            background-color: #0f0;
            color: #000;
            text-shadow: none;
        }

        .game-description {
            font-size: 14px;
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>MESTERY ARCADE</h1>

    <div class="games-container">
        <div class="game-card">
            <h2>SPACE INVADERS</h2>
            <p class="game-description">Classic arcade space shooting game</p>
            <a href="spaceinvaders/index.html">PLAY GAME</a>
        </div>
        
        <div class="game-card">
            <h2>DONKEY KONG</h2>
            <p class="game-description">Classic arcade platform game</p>
            <a href="donkeykong/index.html">PLAY GAME</a>
        </div>

        <div class="game-card">
            <h2>MR. PACMAN</h2>
            <p class="game-description">Classic arcade maze game</p>
            <a href="mrspacman/index.html">PLAY GAME</a>
        </div>

        <!-- Additional games will be added here -->
    </div>
</body>
</html>
